services:
  postgres-integration:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: notification_center_test
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification_center_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda-integration:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.10
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda-integration:9092,OUTSIDE://localhost:19092
    ports:
      - "127.0.0.1:19092:19092"
      - "127.0.0.1:19644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:[[:space:]]*true'"]
      interval: 10s
      timeout: 5s
      retries: 10
